<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Галерея</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <style>
        body {
            margin: 0;
            padding: 0;
            background: #111;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        header {
            padding: 20px;
            text-align: center;
            font-size: 24px;
            font-weight: 600;
            background: #000;
            border-bottom: 1px solid #222;
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 12px;
            padding: 20px;
        }

        .gallery img {
            width: 100%;
            height: auto;
            border-radius: 10px;
            object-fit: cover;
            transition: transform .2s ease, box-shadow .2s ease;
            cursor: pointer;
        }

        .gallery img:hover {
            transform: scale(1.03);
            box-shadow: 0 0 15px rgba(255,255,255,0.2);
        }

        /* Lightbox */
        .lightbox {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.9);
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }

        .lightbox img {
            max-width: 90%;
            max-height: 90%;
            border-radius: 10px;
        }

        .lightbox.active {
            display: flex;
        }
    </style>
</head>

<body>

<header>
    Галерея
</header>

<div class="gallery">
    {% for img in images %}
        <img src="/static/images/{{ hash_id }}/{{ img }}" alt="image" onclick="openLightbox(this.src)">
    {% endfor %}
</div>

<div class="lightbox" id="lightbox" onclick="closeLightbox()">
    <img id="lightbox-img" src="">
</div>

<script>
    function openLightbox(src) {
        const lb = document.getElementById("lightbox");
        const img = document.getElementById("lightbox-img");
        img.src = src;
        lb.classList.add("active");
    }

    function closeLightbox() {
        document.getElementById("lightbox").classList.remove("active");
    }
</script>

</body>
</html>
